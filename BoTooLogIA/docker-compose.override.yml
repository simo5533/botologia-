# Fichier fusionné automatiquement avec docker-compose.yml (Docker Compose v2+)
# Dev : hot reload pour le service app (profil --profile app)
# Recommandé pour le quotidien : BDD dans Docker + `npm run dev` sur l'hôte (DATABASE_URL @ localhost:5433)

services:
  app:
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"

volumes:
  app_node_modules:
